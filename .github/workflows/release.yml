name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Android APK ──────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=../app/upload-keystore.jks" >> android/key.properties

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ── Linux ────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libayatana-appindicator3-dev \
            libkeybinder-3.0-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: "stable"

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        run: flutter build linux --release

      - name: Tar Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ${{ github.workspace }}/BaiShou-Linux.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: BaiShou-Linux.tar.gz

  # ── Windows Installer ────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.1"
          channel: "stable"

      - name: Get dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        run: flutter build windows --release

      - name: Download Inno Setup Languages
        shell: pwsh
        run: |
          $langDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $baseUrl = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages"

          # 下載簡體中文
          Invoke-WebRequest -Uri "$baseUrl/Unofficial/ChineseSimplified.isl" -OutFile "$langDir\ChineseSimplified.isl"
          # 下載繁體中文
          Invoke-WebRequest -Uri "$baseUrl/Unofficial/ChineseTraditional.isl" -OutFile "$langDir\ChineseTraditional.isl"
          # 下載日文
          Invoke-WebRequest -Uri "$baseUrl/Japanese.isl" -OutFile "$langDir\Japanese.isl"

      - name: Create Inno Setup script
        shell: pwsh
        run: |
          $rawVersion = "${{ github.ref_name }}"
          $version = "${{ github.ref_name }}".TrimStart('v')
          $iss = @"
          [Setup]
          AppName=白守
          AppVersion=$version
          AppPublisher=Anson-Trio
          AppPublisherURL=https://github.com/Anson-Trio/BaiShou
          DefaultDirName={autopf}\BaiShou
          DefaultGroupName=白守
          DisableDirPage=no
          CloseApplications=force
          CloseApplicationsFilter=*.*
          OutputDir=installer
          OutputBaseFilename=BaiShou-${{ github.ref_name }}-Windows-Setup
          Compression=lzma
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64compatible
          SetupIconFile=windows\runner\resources\app_icon.ico

          [Languages]
          Name: "en"; MessagesFile: "compiler:Default.isl"
          Name: "zh_cn"; MessagesFile: "compiler:Languages\ChineseSimplified.isl"
          Name: "zh_tw"; MessagesFile: "compiler:Languages\ChineseTraditional.isl"
          Name: "ja"; MessagesFile: "compiler:Languages\Japanese.isl"

          [CustomMessages]
          en.AppName=BaiShou
          zh_cn.AppName=白守
          zh_tw.AppName=白守
          ja.AppName=白守

          en.CreateDesktopIcon=Create a &desktop shortcut
          zh_cn.CreateDesktopIcon=创建桌面快捷方式
          zh_tw.CreateDesktopIcon=建立桌面捷徑
          ja.CreateDesktopIcon=デスクトップにショートカットを作成する

          en.LaunchApp=Launch BaiShou
          zh_cn.LaunchApp=启动白守
          zh_tw.LaunchApp=啟動白守
          ja.LaunchApp=白守を起動する

          en.UninstallApp=Uninstall BaiShou
          zh_cn.UninstallApp=卸载白守
          zh_tw.UninstallApp=移除白守
          ja.UninstallApp=白守をアンインストールする

          en.AdditionalTasks=Additional tasks:
          zh_cn.AdditionalTasks=附加任务:
          zh_tw.AdditionalTasks=附加任務:
          ja.AdditionalTasks=追加タスク:

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalTasks}:"; Flags: unchecked

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\{cm:AppName}"; Filename: "{app}\baishou.exe"
          Name: "{group}\{cm:UninstallApp}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{cm:AppName}"; Filename: "{app}\baishou.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\baishou.exe"; Description: "{cm:LaunchApp}"; Flags: nowait postinstall skipifsilent
          "@
          $iss | Out-File -FilePath setup.iss -Encoding UTF8

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $innoPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $innoPath setup.iss

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/*.exe

  # ── GitHub Release ────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-android, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Download Linux tar
        uses: actions/download-artifact@v4
        with:
          name: linux-tar
          path: artifacts/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Rename Android APK
        run: |
          mv artifacts/app-release.apk artifacts/BaiShou-${{ github.ref_name }}-Android.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: 白守 ${{ github.ref_name }}
          body: |
            ## 白守 ${{ github.ref_name }}

            以纯白誓约，守护彼此一生。

            ### 下载
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Android | `.apk` | 允许安装未知来源后安装 |
            | Windows | `-Setup.exe` | 双击运行安装向导 |
            | Linux | `.tar.gz` | 解压后运行 `baishou` |

            ### 更新内容
            请查看 [提交记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          files: |
            artifacts/BaiShou-${{ github.ref_name }}-Android.apk
            artifacts/BaiShou-Linux.tar.gz
            artifacts/*.exe
          draft: false
          prerelease: false
